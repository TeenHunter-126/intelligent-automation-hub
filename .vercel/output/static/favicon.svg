<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circuit board background shape -->
  <rect width="100" height="100" rx="20" fill="#1a2332"/>
  <!-- Z letterform -->
  <text x="50" y="68" font-family="'Space Grotesk', 'Arial', sans-serif" font-size="58" font-weight="700" text-anchor="middle" fill="url(#g)">Z</text>
  <!-- Decorative dot (circuit node) -->
  <circle cx="80" cy="20" r="5" fill="#00d4ff" opacity="0.8"/>
  <circle cx="20" cy="80" r="5" fill="#4da6ff" opacity="0.8"/>
</svg>
